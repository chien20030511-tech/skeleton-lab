<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 人体骨骼交互实验室</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@3.11.0/dist/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@3.11.0/dist/tf-converter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@3.11.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.0.0/dist/pose-detection.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0a0a0c; font-family: sans-serif; }
        #simulation-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #skeleton-canvas { position: absolute; z-index: 1; }
        #camera-preview-container { position: absolute; top: 20px; right: 20px; width: 180px; height: 135px; border: 2px solid #444; border-radius: 8px; overflow: hidden; background: #000; z-index: 10; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0c; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #00d4ff; z-index: 100; font-size: 1.5rem; }
        #error-msg { font-size: 14px; color: #ff5555; margin-top: 10px; display: none; text-align: center; }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">
        <div>正在加载 AI 模型...</div>
        <div id="error-msg">加载时间较长，请检查网络连接或刷新页面。</div>
    </div>

    <div id="camera-preview-container">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <div id="simulation-container">
        <canvas id="skeleton-canvas"></canvas>
    </div>

    <script>
        let detector;
        const video = document.getElementById('video');
        const canvas = document.getElementById('skeleton-canvas');
        const ctx = canvas.getContext('2d');

        const LABELS = {
            'nose': '头骨', 'left_shoulder': '肩膀', 'right_shoulder': '肩膀',
            'left_elbow': '手肘', 'right_elbow': '手肘', 'left_wrist': '手腕', 
            'right_wrist': '手腕', 'left_hip': '骨盆', 'right_hip': '骨盆',
            'left_knee': '膝盖', 'right_knee': '膝盖', 'left_ankle': '脚踝', 'right_ankle': '脚踝'
        };

        // Connectivity Map
        const BONES = [
            ['left_shoulder', 'right_shoulder'], ['left_shoulder', 'left_elbow'],
            ['left_elbow', 'left_wrist'], ['right_shoulder', 'right_elbow'],
            ['right_elbow', 'right_wrist'], ['left_shoulder', 'left_hip'],
            ['right_shoulder', 'right_hip'], ['left_hip', 'right_hip'],
            ['left_hip', 'left_knee'], ['left_knee', 'left_ankle'],
            ['right_hip', 'right_knee'], ['right_knee', 'right_ankle']
        ];

        async function init() {
            try {
                // Safety check: wait for library to exist
                if (typeof poseDetection === 'undefined') {
                    setTimeout(init, 1000); 
                    return;
                }

                detector = await poseDetection.createDetector(
                    poseDetection.SupportedModels.MoveNet, 
                    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
                );

                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    document.getElementById('loading').style.display = 'none';
                    render();
                };
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('error-msg').innerText = "启动失败: " + err.message;
            }
        }

        async function render() {
            const poses = await detector.estimatePoses(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (poses.length > 0) {
                const kp = poses[0].keypoints;
                const sx = canvas.width / video.videoWidth;
                const sy = canvas.height / video.videoHeight;

                let points = {};
                kp.forEach(p => {
                    if (p.score > 0.35) {
                        points[p.name] = { x: (video.videoWidth - p.x) * sx, y: p.y * sy };
                    }
                });

                // Draw Bones
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 4;
                BONES.forEach(([a, b]) => {
                    if (points[a] && points[b]) {
                        ctx.beginPath();
                        ctx.moveTo(points[a].x, points[a].y);
                        ctx.lineTo(points[b].x, points[b].y);
                        ctx.stroke();
                    }
                });

                // Draw Joints & Labels
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                for (let name in points) {
                    if (LABELS[name]) {
                        ctx.beginPath();
                        ctx.arc(points[name].x, points[name].y, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillText(LABELS[name], points[name].x + 10, points[name].y - 10);
                    }
                }
            }
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
    </script>
</body>
</html>
